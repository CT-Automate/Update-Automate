name: Nexs Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

permissions:
  contents: read

concurrency:
  group: nexs-monitor
  cancel-in-progress: false

jobs:
  capture-and-analyze:
    runs-on:
      - self-hosted
      - Windows
    timeout-minutes: 60

    env:
      NEXIS_EMPLOYEE_CODE: ${{ secrets.NEXIS_EMPLOYEE_CODE }}
      NEXIS_PASSWORD: ${{ secrets.NEXIS_PASSWORD }}
      NEXIS_URL: ${{ secrets.NEXIS_URL }}
      NEXIS_FACILITY: ${{ secrets.NEXIS_FACILITY }}
      NEXIS_USER_DATA_DIR: ${{ secrets.NEXIS_USER_DATA_DIR }}
      NEXIS_BROWSER_CHANNEL: ${{ secrets.NEXIS_BROWSER_CHANNEL }}
      NEXIS_WRITE_JSON: 'false'
      SLACK_ENABLED: ${{ secrets.SLACK_ENABLED }}
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      SLACK_ALL_UPDATES_CHANNEL: ${{ secrets.SLACK_ALL_UPDATES_CHANNEL }}
      SLACK_BREACH_UPDATES_CHANNEL: ${{ secrets.SLACK_BREACH_UPDATES_CHANNEL }}
      SLACK_ALL_UPDATES_WEBHOOK: ${{ secrets.SLACK_ALL_UPDATES_WEBHOOK }}
      SLACK_BREACH_UPDATES_WEBHOOK: ${{ secrets.SLACK_BREACH_UPDATES_WEBHOOK }}
      SLACK_BREACH_UPDATES_INTERVAL_HOURS: ${{ secrets.SLACK_BREACH_UPDATES_INTERVAL_HOURS }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14.6'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r collector/requirements.txt
          python -m playwright install chromium

      - name: Capture screenshots
        run: |
          python collector/capture_only.py
